name: Ingestion quotidienne

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installer les dépendances
        run: npm ci

      - name: Ingestion députés, amendements et questions écrites
        run: npm run ingest
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Debug environnement
        run: |
          echo "platform : $(node -e 'console.log(process.platform)')"
          echo "os.tmpdir() : $(node -e 'import("os").then(m => console.log(m.tmpdir()))')"
          echo "TEMP=$TEMP"
          echo "TMP=$TMP"
          echo "TMPDIR=$TMPDIR"
          echo "TMP dans Node : $(node -e 'console.log(process.env.TEMP, process.env.TMP)')"
          echo "Chemin final : $(node -e 'import("path").then(p => console.log(p.join("/tmp","test.zip")))')"

      - name: Ingestion comptes rendus de séance
        run: npm run ingest:cr
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Ingestion dossiers législatifs
        run: npm run ingest:dossiers
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Ingestion sénateurs, questions et séances Sénat
        run: npm run ingest:senat
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
